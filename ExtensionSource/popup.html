<!DOCTYPE html>
<html data-platform="ios">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body, #root {
            width: 100%;
            min-width: 0;
            min-height: 0;
            margin: 0;
            overflow: hidden;
            color-scheme: light dark;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.92), transparent 34%),
                linear-gradient(180deg, #f8f8fa 0%, #f0f0f5 100%);
        }

        @media (prefers-color-scheme: dark) {
            html, body, #root {
                background:
                    radial-gradient(circle at top, rgba(124, 147, 183, 0.16), transparent 34%),
                    linear-gradient(180deg, #181c22 0%, #0f1216 100%);
            }
        }
    </style>
    <link rel="stylesheet" href="app.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
